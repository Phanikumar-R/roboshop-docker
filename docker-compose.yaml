services:
    catalogue:
      build:
        dockerfile: catalogue.Dockerfile # it moves to catalogue directory
      image: joindevops/catalogue:1.0.0 # docker build -t devopsskillup/catalogue:1.0.0 .
      container_name: catalogue
      depends_on:
        - mongodb
    user:
      build:
        dockerfile: user.Dockerfile # it moves to user directory
      image: joindevops/user:1.0.0 # docker build -t devopsskillup/user:1.0.0 .
      container_name: user
      depends_on:
        - redis
    frontend:
      build:
        dockerfile: frontend.Dockerfile # it moves to frontend directory
      image: joindevops/frontend:1.0.0 # docker build -t+
      container_name: frontend
      ports:
        - "80:80"
      depends_on:
        - catalogue
        - user
    mongodb:
       build: 
         dockerfile: mongodb.Dockerfile # it moves to mongodb directory
       image: joindevops/mongodb:1.0.0 # docker build -t devopsskillup/mongodb:1.0.0 .
       container_name: mongodb
    redis:
       image: redis:7.0
       container_name: redis


networks:
  default:
    driver: bridge
    name: roboshop
    external: false   # if true,you need to create network manually 


      

